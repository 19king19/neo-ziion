<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZIION — IP Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="light-theme.css?v=2">
  <link rel="stylesheet" href="mobile.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0F0E12;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 500;
      letter-spacing: 0.01em;
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Sticky Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15, 14, 18, 0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: 6px; color: #fff; text-transform: uppercase; text-decoration: none; }
    .search-bar {
      flex: 0 1 420px; height: 40px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; display: flex; align-items: center; padding: 0 14px; gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-bar:focus-within { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); }
    .search-bar svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.3); flex-shrink: 0; }
    .search-bar input { flex: 1; background: none; border: none; outline: none; color: #fff; font-size: 14px; font-weight: 400; }
    .search-bar input::placeholder { color: rgba(255,255,255,0.3); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .notification-bell { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
    .notification-bell:hover { background: rgba(255,255,255,0.06); }
    .notification-bell svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.5); fill: none; stroke-width: 1.8; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.1); cursor: pointer; }

    /* ── Main Layout ── */
    .main-layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; background: rgba(15, 14, 18, 0.6);
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 16px 12px; display: flex; flex-direction: column; gap: 2px;
      overflow-y: auto; flex-shrink: 0;
    }
    .sidebar::-webkit-scrollbar { width: 0; }
    .sidebar-create {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; margin-bottom: 12px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #fff; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .sidebar-create:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
    .sidebar-create svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 14px; border-radius: 8px;
      color: rgba(255,255,255,0.5); text-decoration: none;
      font-size: 13.5px; font-weight: 500; transition: all 0.15s; cursor: pointer;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
    .nav-item.active { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 14px; }
    .theme-toggle { margin-top: auto; padding: 8px 14px; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; }
    .theme-toggle:hover { opacity: 0.7; }
    .theme-toggle svg { width: 18px; height: 18px; }

    /* ── Content Area ── */
    .content {
      flex: 1; overflow-y: auto; padding: 0;
    }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* ═══════════════════════════════════════
       VAULT DESIGN
       ═══════════════════════════════════════ */

    /* ── Vault Header ── */
    .vault-header {
      padding: 60px 60px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .vault-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 4px;
      color: rgba(255,255,255,0.25);
      margin-bottom: 16px;
    }
    .vault-title {
      font-size: 48px; font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .vault-subtitle {
      font-size: 16px; font-weight: 400;
      color: rgba(255,255,255,0.35);
      max-width: 500px; line-height: 1.5;
    }
    .vault-count {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 20px;
      font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.3);
    }
    .vault-count strong {
      font-size: 15px; font-weight: 700;
      color: #D5FF5A;
    }

    /* ── Vault Section ── */
    .vault-section {
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .vault-section:last-child { border-bottom: none; }

    .vault-section-header {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 60px 12px;
      cursor: pointer;
      user-select: none;
    }
    .vault-section-title {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 3px;
      color: rgba(255,255,255,0.25);
    }
    .vault-section-count {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.15);
      margin-left: 4px;
    }
    .vault-section-icon {
      width: 16px; height: 16px;
      stroke: rgba(255,255,255,0.15);
      fill: none; stroke-width: 2;
      flex-shrink: 0;
    }

    /* ── Vault Row ── */
    .vault-row {
      display: flex;
      align-items: center;
      padding: 16px 60px;
      border-top: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.15s;
      gap: 20px;
    }
    .vault-row:hover {
      background: rgba(255,255,255,0.03);
    }

    /* File icon */
    .vault-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.2s;
    }
    .vault-row:hover .vault-icon {
      border-color: rgba(213,255,90,0.3);
    }
    .vault-icon-label {
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
    .vault-icon.brand .vault-icon-label { color: #D5FF5A; }
    .vault-icon.framework .vault-icon-label { color: #5AB4FF; }
    .vault-icon.content .vault-icon-label { color: #FF9F5A; }
    .vault-icon.product .vault-icon-label { color: #C78FFF; }
    .vault-icon.media .vault-icon-label { color: #FF6B8A; }
    .vault-icon.concept .vault-icon-label { color: #5AFFD4; }
    .vault-icon.event .vault-icon-label { color: #FFD95A; }

    /* Row content */
    .vault-name {
      flex: 1;
      font-size: 15px; font-weight: 500;
      color: rgba(255,255,255,0.85);
      letter-spacing: -0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vault-row:hover .vault-name { color: #fff; }

    .vault-meta {
      font-size: 13px; font-weight: 400;
      color: rgba(255,255,255,0.2);
      text-align: right;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 80px;
    }

    .vault-status {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.5px;
      padding: 4px 12px;
      border-radius: 100px;
      flex-shrink: 0;
    }
    .vault-status.active { background: rgba(213,255,90,0.1); color: #D5FF5A; }
    .vault-status.draft { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); }
    .vault-status.filed { background: rgba(90,180,255,0.1); color: #5AB4FF; }

    /* ── Add Row ── */
    .vault-add-row {
      display: flex; align-items: center; gap: 20px;
      padding: 16px 60px;
      border-top: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.15s;
    }
    .vault-add-row:hover { background: rgba(213,255,90,0.03); }
    .vault-add-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 1px dashed rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color 0.2s;
    }
    .vault-add-row:hover .vault-add-icon { border-color: rgba(213,255,90,0.4); }
    .vault-add-icon svg {
      width: 16px; height: 16px;
      stroke: rgba(255,255,255,0.15);
      fill: none; stroke-width: 2;
    }
    .vault-add-row:hover .vault-add-icon svg { stroke: rgba(213,255,90,0.6); }
    .vault-add-text {
      font-size: 14px; font-weight: 500;
      color: rgba(255,255,255,0.2);
    }
    .vault-add-row:hover .vault-add-text { color: rgba(213,255,90,0.6); }

    /* ── Modal ── */
    .ip-modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(20px);
      display: none; align-items: center; justify-content: center; padding: 40px;
    }
    .ip-modal-overlay.active { display: flex; }
    .ip-modal {
      background: #1a1a20;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; width: 100%; max-width: 560px; overflow: hidden;
    }
    .ip-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ip-modal-header h3 { font-size: 16px; font-weight: 700; }
    .ip-modal-close {
      width: 30px; height: 30px; border-radius: 8px;
      background: rgba(255,255,255,0.06); border: none;
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background 0.2s;
    }
    .ip-modal-close:hover { background: rgba(255,255,255,0.12); }
    .ip-modal-body { padding: 24px 28px; }
    .ip-modal-body label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: rgba(255,255,255,0.35); margin-bottom: 6px;
    }
    .ip-modal-body input,
    .ip-modal-body select,
    .ip-modal-body textarea {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #fff; font-size: 14px; font-family: inherit;
      outline: none; margin-bottom: 16px; transition: border-color 0.2s;
    }
    .ip-modal-body input:focus,
    .ip-modal-body select:focus,
    .ip-modal-body textarea:focus { border-color: #D5FF5A; }
    .ip-modal-body textarea { min-height: 60px; resize: vertical; }
    .ip-modal-body select option { background: #1a1a20; }
    .ip-modal-footer {
      display: flex; justify-content: flex-end; gap: 10px;
      padding: 18px 28px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .ip-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit; border: none;
    }
    .ip-btn-primary { background: #D5FF5A; color: #0F0E12; }
    .ip-btn-primary:hover { background: #e2ff7a; }
    .ip-btn-secondary {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: #fff;
    }
    .ip-btn-secondary:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>

    <!-- Content: THE VAULT -->

      <!-- Vault Header -->

        <div class="vault-label">Intellectual Property</div>
        <div class="vault-title">The Vault</div>
        <div class="vault-subtitle">Every brand, framework, product, and concept — catalogued and protected under your empire.</div>
        <div class="vault-count"><strong id="totalCount">0</strong>&nbsp;assets across&nbsp;<strong>7</strong>&nbsp;categories</div>

  <!-- Add Modal -->
  <div class="ip-modal-overlay" id="ipModal">
    <div class="ip-modal">
      <div class="ip-modal-header">
        <h3>Add to Vault</h3>
        <button class="ip-modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="ip-modal-body">
        <label>Title</label>
        <input type="text" id="ipTitle" placeholder="e.g. ZIION Platform">
        <label>Category</label>
        <select id="ipCategory">
          <option value="brand">Brand</option>
          <option value="framework">Framework</option>
          <option value="content">Content</option>
          <option value="product">Product</option>
          <option value="media">Media</option>
          <option value="concept">Concept</option>
          <option value="event">Event</option>
        </select>
        <label>Status</label>
        <select id="ipStatus">
          <option value="active">Active</option>
          <option value="draft">Draft</option>
          <option value="filed">Filed / Protected</option>
        </select>
        <label>Notes</label>
        <textarea id="ipNotes" placeholder="Brief description..."></textarea>
      </div>
      <div class="ip-modal-footer">
        <button class="ip-btn ip-btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="ip-btn ip-btn-primary" onclick="saveIP()">Add Asset</button>
      </div>
    </div>
  </div>

  <script src="theme-toggle.js"></script>
  <script src="mobile-nav.js"></script>
  <script>
    /* ══════════════════════════════════════
       THE VAULT — IP Data
       ══════════════════════════════════════ */
    const vault = [
      // Brands
      { title: "ZIION",                       cat: "brand",     status: "active", meta: "Platform" },
      { title: "T1 Energy",                   cat: "brand",     status: "active", meta: "Identity System" },
      { title: "The Architect",               cat: "brand",     status: "filed",  meta: "Personal Brand" },
      { title: "19Keys",                      cat: "brand",     status: "active", meta: "Creator Brand" },
      { title: "Sovereign Empire",            cat: "brand",     status: "filed",  meta: "Holding Co." },

      // Frameworks
      { title: "Sovereign Empire Framework",  cat: "framework", status: "filed",  meta: "Business Model" },
      { title: "The Metacognition Method",    cat: "framework", status: "filed",  meta: "Learning System" },
      { title: "Community Builder Toolkit",   cat: "framework", status: "active", meta: "Playbook" },
      { title: "Knowledge Protocol",          cat: "framework", status: "filed",  meta: "Info Architecture" },
      { title: "Liberation Economics",        cat: "framework", status: "active", meta: "Economic Model" },

      // Products
      { title: "ZIION Platform",              cat: "product",   status: "active", meta: "Web App" },
      { title: "Cosmos Grid Dashboard",       cat: "product",   status: "active", meta: "Dashboard" },
      { title: "Chairman OS",                 cat: "product",   status: "active", meta: "Operating System" },
      { title: "ZIION Threads Engine",        cat: "product",   status: "active", meta: "Social Layer" },
      { title: "Pulse Analytics",             cat: "product",   status: "draft",  meta: "Analytics" },
      { title: "ZIION Mobile",                cat: "product",   status: "draft",  meta: "iOS / Android" },
      { title: "Sovereign Wallet",            cat: "product",   status: "draft",  meta: "FinTech" },
      { title: "Wealth Visualization Tool",   cat: "product",   status: "draft",  meta: "Finance" },

      // Content
      { title: "Generational Wealth Blueprint",cat: "content",  status: "active", meta: "Course" },
      { title: "Sovereign Economics Course",  cat: "content",   status: "draft",  meta: "Course" },
      { title: "Liberation Playbook",         cat: "content",   status: "active", meta: "Guide" },
      { title: "The Builder's Manifesto",     cat: "content",   status: "active", meta: "Written Work" },

      // Media
      { title: "19Keys Podcast",              cat: "media",     status: "active", meta: "Podcast" },
      { title: "Empire Media Network",        cat: "media",     status: "active", meta: "Media Co." },
      { title: "Cultural Renaissance Series", cat: "media",     status: "active", meta: "Video Series" },

      // Concepts
      { title: "Chairman OS Concept",         cat: "concept",   status: "active", meta: "Architecture" },
      { title: "Decentralized Identity",      cat: "concept",   status: "draft",  meta: "Research" },
      { title: "Node Network Architecture",   cat: "concept",   status: "filed",  meta: "Infrastructure" },
      { title: "Sovereign Digital State",     cat: "concept",   status: "draft",  meta: "Vision Paper" },
    ];

    /* ── Category config ── */
    const catConfig = {
      brand:     { label: "Br", order: 1, sectionTitle: "Brands & Identity" },
      framework: { label: "Fw", order: 2, sectionTitle: "Frameworks & Systems" },
      product:   { label: "Pr", order: 3, sectionTitle: "Products & Tools" },
      content:   { label: "Cn", order: 4, sectionTitle: "Content & Courses" },
      media:     { label: "Md", order: 5, sectionTitle: "Media & Production" },
      concept:   { label: "Cp", order: 6, sectionTitle: "Concepts & Research" },
      event:     { label: "Ev", order: 7, sectionTitle: "Events" },
    };

    /* ── Render vault ── */
    function renderVault() {
      const body = document.getElementById('vaultBody');
      body.innerHTML = '';

      // Group by category
      const groups = {};
      vault.forEach(item => {
        if (!groups[item.cat]) groups[item.cat] = [];
        groups[item.cat].push(item);
      });

      // Sort categories by order
      const sortedCats = Object.keys(groups).sort((a, b) =>
        (catConfig[a]?.order || 99) - (catConfig[b]?.order || 99)
      );

      sortedCats.forEach(cat => {
        const cfg = catConfig[cat] || { label: "??", sectionTitle: cat };
        const items = groups[cat];

        // Section header
        const section = document.createElement('div');
        section.className = 'vault-section';

        let html = `
          <div class="vault-section-header">
            <svg class="vault-section-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
              <polyline points="13 2 13 9 20 9"/>
            </svg>
            <span class="vault-section-title">${cfg.sectionTitle}</span>
            <span class="vault-section-count">${items.length}</span>
          </div>`;

        // Rows
        items.forEach(item => {
          const statusCls = item.status === 'active' ? 'active' : item.status === 'filed' ? 'filed' : 'draft';
          const statusLabel = item.status === 'filed' ? 'Filed' : item.status.charAt(0).toUpperCase() + item.status.slice(1);
          html += `
          <div class="vault-row" data-title="${item.title.toLowerCase()}" data-cat="${item.cat}">
            <div class="vault-icon ${item.cat}">
              <span class="vault-icon-label">${cfg.label}</span>
            </div>
            <div class="vault-name">${item.title}</div>
            <div class="vault-meta">${item.meta}</div>
            <span class="vault-status ${statusCls}">${statusLabel}</span>
          </div>`;
        });

        section.innerHTML = html;
        body.appendChild(section);
      });

      // Add row at bottom
      const addRow = document.createElement('div');
      addRow.className = 'vault-add-row';
      addRow.onclick = openModal;
      addRow.innerHTML = `
        <div class="vault-add-icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div class="vault-add-text">Add new IP asset</div>`;
      body.appendChild(addRow);

      document.getElementById('totalCount').textContent = vault.length;
    }

    /* ── Search ── */
    document.getElementById('ipSearch').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      document.querySelectorAll('.vault-row').forEach(row => {
        const title = row.getAttribute('data-title') || '';
        row.style.display = title.includes(q) ? '' : 'none';
      });
    });

    /* ── Modal ── */
    function openModal() { document.getElementById('ipModal').classList.add('active'); }
    function closeModal() {
      document.getElementById('ipModal').classList.remove('active');
      document.getElementById('ipTitle').value = '';
      document.getElementById('ipNotes').value = '';
    }

    function saveIP() {
      const title = document.getElementById('ipTitle').value.trim();
      if (!title) return;
      const cat = document.getElementById('ipCategory').value;
      vault.push({
        title,
        cat,
        status: document.getElementById('ipStatus').value,
        meta: cat.charAt(0).toUpperCase() + cat.slice(1),
      });
      closeModal();
      renderVault();
    }

    /* ── Init ── */
    renderVault();
  </script>
</body>
</html>
